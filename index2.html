<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .hero-image {
        position: relative;
        width: 500px;
        height: 600px;
      }

      .circle {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 100%;
      }

      .person {
        position: absolute;
        bottom: 0;
        right: 30px;
      }
    </style>
  </head>
  <body>
    <div class="hero-image">
      <img
        class="circle"
        src="./b14-portfolio-resources/images/header_bg.png"
      />
      <img class="person" src="./b14-portfolio-resources/images/hardy.png" />
    </div>
  </body>
</html>
